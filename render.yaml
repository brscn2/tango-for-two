services:
  - type: web
    name: tango-for-two
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DB_PATH
        value: /var/data/tango.sqlite
      - key: CORS_ORIGIN
        value: "*"
    disk:
      name: tango-data
      mountPath: /var/data
      sizeGB: 1
